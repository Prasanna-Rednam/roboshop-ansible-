- name: mongodb config
  hosts: mongodb
  become: yes
  tasks:
  - name: Copy mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: dnf install mongodb
    ansible.builtin.dnf:
      name: mongodb-org 
      state: present
    

  - name: allow remote connections
    ansible.builtin.replace:
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: Enable and start mongodb
    ansible.builtin.service:
      name: mongod
      enabled: yes
      state: started
    

