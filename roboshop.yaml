- name: create ec2 and route 53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-01c30fb2c0e9cf7c5
    ami_id: ami-0220d79f3f480ecf5
    domain_name: paws-88s.online
    env: dev
    instances: 
    - mongodb
    - catlogue
  tasks: 
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env  }}"
    loop: "{{ instances }}"
    register: ec2_output
  
  - name: print the output
    ansible.builtin.debug:
      var: ec2_output
  
  - name: create r53 record
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" # mongodb.dev.paw88s.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"

  - name: create r53 record frontend
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" # roboshop.dev.paw88s.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: item.item == "frontend"
      
     
      