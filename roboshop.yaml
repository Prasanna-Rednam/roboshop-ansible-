- name: create ec2 and route 53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-01c30fb2c0e9cf7c5
    ami_id: ami-0220d79f3f480ecf5
    env: dev
    instances: 
    - mongodb
    - catlogue
  tasks: 
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env  }}"
    loop: "{{ instances }}"
    register: ec2_output
  
  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output | to_nice_json }}"
 
     
     
      